<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - hundehelfer.ai</title>
  <link rel="stylesheet" href="/offline-fallback.css">
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Du bist offline</h1>
    <p>Keine Internetverbindung verfügbar.</p>
    <p class="offline-hint">Du kannst heruntergeladene Inhalte anschauen, aber neue Daten laden funktioniert nicht.</p>
    <button class="offline-btn" onclick="location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
